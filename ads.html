<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#070a13" />
  <link rel="stylesheet" href="style.css" />
  <title>CS2 Case Lab — Реклама</title>
</head>
<body data-page="ads.html">
  <header class="topbar" id="siteHeader"></header>
  <section class="live-feed"><div id="liveFeed" class="live-track"></div></section>

  <main class="site-shell">
    <div class="section-head"><div><span class="eyebrow">ads reward</span><h2>Реклама твоих проектов</h2><p>Фейковый рекламный просмотр на 10 секунд. После таймера начисляются LabCoins.</p></div><button id="watchAdBtn" class="primary">Смотреть рекламу</button></div>
    <div class="stats-grid"><div class="stat-card"><b id="adsWatched">0</b><span>просмотров</span></div><div class="stat-card"><b>◆ <span id="adsEarned">0</span></b><span>заработано</span></div><div class="stat-card"><b>10 сек</b><span>таймер</span></div></div>
    <section><div class="section-head"><div><span class="eyebrow">creative pool</span><h2>Баннеры проектов</h2></div></div><div id="adProjects" class="grid project-grid"></div></section>
  </main>
  <div id="adOverlay" class="ad-overlay hidden">
    <div class="ad-box">
      <button id="adCloseBtn" class="modal-close" aria-label="Закрыть">×</button>
      <div id="adTimer" class="ad-timer">10</div>
      <div class="ad-creative"><span id="adBadge" class="ad-badge">WEB</span><h2 id="adTitle">Проект</h2><p id="adText">Описание проекта</p><a id="adLink" class="ghost" href="#" target="_blank" rel="noopener">Открыть проект</a></div>
      <button id="adRewardBtn" class="primary" disabled>Подожди...</button>
    </div>
  </div>
  <footer>Ссылки проектов меняются в массиве `projects` в data.js.</footer>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
