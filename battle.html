<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#070a13" />
  <link rel="stylesheet" href="style.css" />
  <title>CS2 Case Lab — Case Battle</title>
</head>
<body data-page="battle.html">
  <header class="topbar" id="siteHeader"></header>
  <section class="live-feed"><div id="liveFeed" class="live-track"></div></section>

  <main class="site-shell">
    <div class="section-head"><div><span class="eyebrow">case battle</span><h2>Баттл против ботов</h2><p>Платишь только за свои раунды. Победитель забирает все выпавшие предметы в баттле.</p></div></div>
    <section class="panel soft">
      <div class="battle-config">
        <label>Кейс<select id="battleCase"></select></label>
        <label>Раунды<select id="battleRounds"><option>1</option><option>2</option><option>3</option><option>5</option></select></label>
        <label>Игроки<select id="battlePlayers"><option>2</option><option>3</option><option>4</option></select></label>
        <button id="startBattleBtn" class="primary">Старт</button>
      </div>
      <p class="muted">Стоимость: ◆ <b id="battleCost">0</b> • <span id="battleModeText">—</span></p>
      <div id="battleResult"></div>
    </section>
  </main>
  <footer>Баттл — фейковая локальная симуляция без реальных игроков.</footer>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
