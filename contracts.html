<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#070a13" />
  <link rel="stylesheet" href="style.css" />
  <title>CS2 Case Lab — Контракты</title>
</head>
<body data-page="contracts.html">
  <header class="topbar" id="siteHeader"></header>
  <section class="live-feed"><div id="liveFeed" class="live-track"></div></section>

  <main class="site-shell">
    <div class="section-head"><div><span class="eyebrow">contracts</span><h2>Контракты</h2><p>Добавь от 3 до 10 предметов, чтобы обменять их на один новый предмет.</p></div><button id="clearContractBtn" class="ghost">Очистить</button></div>
    <section class="contract-layout">
      <div id="contractInventory" class="contract-list"></div>
      <aside class="panel soft sticky-card">
        <span class="eyebrow">selected</span>
        <h2><span id="contractCount">0/10</span></h2>
        <p>Сумма: ◆ <b id="contractValue">0</b></p>
        <div id="contractPreview"></div>
        <button id="contractBtn" class="primary">Запустить контракт</button>
      </aside>
    </section>
  </main>
  <footer>Контракт потребляет выбранные предметы и создаёт новый локальный предмет.</footer>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
