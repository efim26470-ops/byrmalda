<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#070a13" />
  <link rel="stylesheet" href="style.css" />
  <title>CS2 Case Lab — Инвентарь</title>
</head>
<body data-page="inventory.html">
  <header class="topbar" id="siteHeader"></header>
  <section class="live-feed"><div id="liveFeed" class="live-track"></div></section>

  <main class="site-shell">
    <div class="section-head">
      <div><span class="eyebrow">inventory</span><h2>Инвентарь</h2><p>Продажа начисляет LabCoins, предмет можно отправить в апгрейд или контракт.</p></div>
      <button id="sellAllBtn" class="ghost">Продать всё</button>
    </div>
    <div class="stats-grid">
      <div class="stat-card"><b id="inventoryCount">0</b><span>предметов</span></div>
      <div class="stat-card"><b>◆ <span id="inventoryValue">0</span></b><span>общая стоимость</span></div>
      <div class="stat-card"><b id="inventoryBest">—</b><span>лучший дроп</span></div>
    </div>
    <div class="filters">
      <input id="inventorySearch" class="input" placeholder="Поиск: AK, AWP, Knife..." />
      <select id="rarityFilter"><option value="all">Все редкости</option></select>
      <select id="sortInventory"><option value="new">Сначала новые</option><option value="valueDesc">Дороже сверху</option><option value="valueAsc">Дешевле сверху</option><option value="rarity">По редкости</option></select>
      <a class="primary" href="cases.html">Открыть ещё</a>
    </div>
    <div id="inventoryGrid" class="grid item-grid"></div>
  </main>
  <footer>Данные инвентаря сохраняются в localStorage конкретного браузера.</footer>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
