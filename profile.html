<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#070a13" />
  <link rel="stylesheet" href="style.css" />
  <title>CS2 Case Lab — Профиль</title>
</head>
<body data-page="profile.html">
  <header class="topbar" id="siteHeader"></header>
  <section class="live-feed"><div id="liveFeed" class="live-track"></div></section>

  <main class="site-shell">
    <div class="section-head"><div><span class="eyebrow">local profile</span><h2>Профиль и статистика</h2><p>Вся статистика хранится локально в браузере.</p></div><button id="resetBtn" class="ghost danger">Сбросить прогресс</button></div>
    <div class="stats-grid profile-grid">
      <div class="stat-card"><b>◆ <span id="profileBalance">0</span></b><span>баланс</span></div>
      <div class="stat-card"><b>◆ <span id="profileSpent">0</span></b><span>потрачено</span></div>
      <div class="stat-card"><b>◆ <span id="profileEarned">0</span></b><span>заработано</span></div>
      <div class="stat-card"><b id="profileAds">0</b><span>реклам</span></div>
      <div class="stat-card"><b id="profileUpgrades">0/0</b><span>апгрейды</span></div>
      <div class="stat-card"><b id="profileBattles">0/0</b><span>баттлы</span></div>
      <div class="stat-card"><b id="profileContracts">0</b><span>контракты</span></div>
      <div class="stat-card"><b id="profileOpened">0</b><span>кейсов</span></div>
    </div>
  </main>
  <footer>Для переноса прогресса нужен сервер или экспорт localStorage.</footer>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
