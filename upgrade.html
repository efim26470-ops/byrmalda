<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#070a13" />
  <link rel="stylesheet" href="style.css" />
  <title>CS2 Case Lab — Апгрейд</title>
</head>
<body data-page="upgrade.html">
  <header class="topbar" id="siteHeader"></header>
  <section class="live-feed"><div id="liveFeed" class="live-track"></div></section>

  <main class="site-shell">
    <div class="section-head"><div><span class="eyebrow">upgrade</span><h2>Апгрейд предметов</h2><p>Выбираешь предмет из инвентаря и цель. При неудаче исходный предмет исчезает.</p></div></div>
    <section class="panel soft upgrade-layout">
      <div><label>Твой предмет</label><select id="upgradeOwn"></select></div>
      <div><label>Цель апгрейда</label><select id="upgradeTarget"></select></div>
      <div id="upgradePreview" class="upgrade-preview"></div>
      <div class="chance-panel">
        <span class="eyebrow">success chance</span>
        <div id="upgradeChance" class="chance-number">0%</div>
        <div class="meter"><span id="upgradeMeter"></span></div>
        <button id="upgradeBtn" class="primary">Запустить апгрейд</button>
      </div>
    </section>
  </main>
  <footer>Апгрейд — локальная риск-механика фан-симулятора.</footer>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
