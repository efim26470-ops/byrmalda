<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#070a13" />
  <link rel="stylesheet" href="style.css" />
  <title>CS2 Case Lab — Бонусы</title>
</head>
<body data-page="wheel.html">
  <header class="topbar" id="siteHeader"></header>
  <section class="live-feed"><div id="liveFeed" class="live-track"></div></section>

  <main class="site-shell">
    <div class="section-head"><div><span class="eyebrow">bonus zone</span><h2>Колесо бонусов</h2><p>Бесплатное колесо, ежедневный бонус и промокоды для теста сайта.</p></div></div>
    <section class="wheel-layout">
      <div class="panel soft wheel-wrap"><div class="wheel-pointer"></div><div id="bonusWheel" class="wheel"></div></div>
      <div class="bonus-stack">
        <div class="bonus-card"><h3>Колесо</h3><p id="wheelHint">Готово.</p><button id="spinWheelBtn" class="primary">Крутить</button></div>
        <div class="bonus-card"><h3>Ежедневный бонус</h3><p>Раз в день можно забрать ◆ 500.</p><button id="dailyBtn" class="ghost">Забрать</button></div>
        <div class="bonus-card"><h3>Промокод</h3><p>Для проверки: <b>LAB2026</b>, <b>EFIM</b>, <b>CASELAB</b>.</p><div class="row"><input id="promoInput" class="input" placeholder="Промокод" /><button id="promoBtn" class="primary">OK</button></div></div>
      </div>
    </section>
  </main>
  <footer>Бонусы начисляют только внутреннюю валюту симулятора.</footer>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
